<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Master Schemer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%23b57f1d'/%3E%3Cpolyline points='5 17 10 17 10 8 19 8' fill='none' stroke='white' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body data-tool="select">

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-select" viewBox="0 0 24 24"><path d="M6 3.5 17.5 13l-5.2.9L9.6 19.5Z"/></symbol>
    <symbol id="i-path" viewBox="0 0 24 24"><polyline points="4 19 10 19 10 9 20 9"/><circle cx="4" cy="19" r="1.6" fill="currentColor" stroke="none"/><circle cx="20" cy="9" r="1.6" fill="currentColor" stroke="none"/></symbol>
    <symbol id="i-segment" viewBox="0 0 24 24"><path d="M3 12h18" opacity=".45"/><path d="M8.5 12h7" stroke-width="4.2"/></symbol>
    <symbol id="i-card" viewBox="0 0 24 24"><rect x="3.5" y="5.5" width="17" height="13" rx="2.5"/><path d="M7 10h6"/></symbol>
    <symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 19 17 7M17 7h-6M17 7v6"/></symbol>
    <symbol id="i-draw" viewBox="0 0 24 24"><path d="M14.5 5.5l4 4L9 19H5v-4Z"/><path d="M12.5 7.5l4 4"/></symbol>
    <symbol id="i-text" viewBox="0 0 24 24"><path d="M5 6h14M12 6v13"/></symbol>
    <symbol id="i-hand" viewBox="0 0 24 24"><path d="M12 3v18M3 12h18M12 3l-2.5 2.5M12 3l2.5 2.5M12 21l-2.5-2.5M12 21l2.5-2.5M3 12l2.5-2.5M3 12l2.5 2.5M21 12l-2.5-2.5M21 12l-2.5 2.5"/></symbol>
    <symbol id="i-undo" viewBox="0 0 24 24"><path d="M8 5 4 9l4 4"/><path d="M4 9h9.5a5.5 5.5 0 1 1 0 11H10"/></symbol>
    <symbol id="i-redo" viewBox="0 0 24 24"><path d="m16 5 4 4-4 4"/><path d="M20 9h-9.5a5.5 5.5 0 1 0 0 11H14"/></symbol>
    <symbol id="i-zoom-in" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5 21 21M10.5 8v5M8 10.5h5"/></symbol>
    <symbol id="i-zoom-out" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5 21 21M8 10.5h5"/></symbol>
    <symbol id="i-fit" viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></symbol>
  </defs>
</svg>

<header id="topbar">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24"><polyline points="5 17 10 17 10 8 19 8" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <h1>Master Schemer</h1>
  </div>
  <div class="topbar-group">
    <button class="btn" id="newBtn">New</button>
    <button class="btn" id="openBtn">Open</button>
    <button class="btn" id="saveBtn" data-tip="Save scheme (Ctrl+S)">Save</button>
    <button class="btn" id="exportBtn" data-tip="Export SVG (Ctrl+E)">Export SVG</button>
  </div>
  <div class="topbar-group">
    <button class="icon-btn" id="undoBtn" data-tip="Undo (Ctrl+Z)" aria-label="Undo"><svg><use href="#i-undo"/></svg></button>
    <button class="icon-btn" id="redoBtn" data-tip="Redo (Ctrl+Shift+Z)" aria-label="Redo"><svg><use href="#i-redo"/></svg></button>
  </div>
  <div class="topbar-group" id="zoomGroup">
    <button class="icon-btn" id="zoomOut" data-tip="Zoom out (−)" aria-label="Zoom out"><svg><use href="#i-zoom-out"/></svg></button>
    <button class="btn zoom-label" id="zoomLabel" data-tip="Reset to 100% (0)">100%</button>
    <button class="icon-btn" id="zoomIn" data-tip="Zoom in (+)" aria-label="Zoom in"><svg><use href="#i-zoom-in"/></svg></button>
    <button class="icon-btn" id="zoomFit" data-tip="Fit scheme (1)" aria-label="Fit scheme in view"><svg><use href="#i-fit"/></svg></button>
  </div>
</header>

<aside id="toolrail" role="toolbar" aria-label="Drawing tools" aria-orientation="vertical">
  <button class="tool-btn" data-tool="select" data-tip="Select — V" aria-label="Select tool"><svg><use href="#i-select"/></svg></button>
  <button class="tool-btn" data-tool="path" data-tip="Line — L" aria-label="Line tool"><svg><use href="#i-path"/></svg></button>
  <button class="tool-btn" data-tool="segment" data-tip="Segment — S" aria-label="Segment tool"><svg><use href="#i-segment"/></svg></button>
  <div class="rail-rule" role="separator"></div>
  <button class="tool-btn" data-tool="card" data-tip="Card — C" aria-label="Card tool"><svg><use href="#i-card"/></svg></button>
  <button class="tool-btn" data-tool="arrow" data-tip="Connect — A" aria-label="Connect tool"><svg><use href="#i-arrow"/></svg></button>
  <div class="rail-rule" role="separator"></div>
  <button class="tool-btn" data-tool="draw" data-tip="Freehand — D" aria-label="Freehand tool"><svg><use href="#i-draw"/></svg></button>
  <button class="tool-btn" data-tool="text" data-tip="Note — T" aria-label="Note tool"><svg><use href="#i-text"/></svg></button>
  <div class="rail-rule" role="separator"></div>
  <button class="tool-btn" data-tool="hand" data-tip="Pan — H or Space" aria-label="Pan tool"><svg><use href="#i-hand"/></svg></button>
</aside>

<main id="canvasWrap">
  <svg id="canvas">
    <defs>
      <pattern id="gridDots" width="20" height="20" patternUnits="userSpaceOnUse">
        <circle cx="0" cy="0" r="1" fill="#d8d2c6"/>
        <circle cx="20" cy="0" r="1" fill="#d8d2c6"/>
        <circle cx="0" cy="20" r="1" fill="#d8d2c6"/>
        <circle cx="20" cy="20" r="1" fill="#d8d2c6"/>
      </pattern>
      <marker id="arrowHead" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M0 0.5 9 5 0 9.5z" fill="#55504a"/>
      </marker>
      <marker id="arrowHeadSel" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M0 0.5 9 5 0 9.5z" fill="#b57f1d"/>
      </marker>
      <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="120%">
        <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#3a3020" flood-opacity="0.13"/>
      </filter>
    </defs>
    <g id="world">
      <rect id="gridRect" fill="url(#gridDots)"/>
      <g id="layer-cards"></g>
      <g id="layer-arrows"></g>
      <g id="layer-draw"></g>
      <g id="layer-overlay"></g>
      <g id="layer-preview"></g>
    </g>
  </svg>
</main>

<aside id="panel" aria-label="Properties">
  <div id="panelBody"></div>
</aside>

<footer id="statusbar">
  <span id="hint"></span>
  <span class="status-right"><span id="coords">0, 0</span></span>
</footer>

<input type="file" id="fileInput" accept=".json,application/json" hidden>
<script type="module" src="js/app.js"></script>
</body>
</html>
